name: Deploy

# Deploy the MCP server (and rebuild the browser extensions) on the self-hosted
# runner whenever main changes. Runs on pushes to main; can also be triggered
# manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; a newer push to main supersedes an older,
# still-running deploy so the latest commit is what ends up deployed.
concurrency:
  group: deploy-main
  cancel-in-progress: true

# Least-privilege token: this workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Rebuild the Chrome + Firefox extension bundles so the shipped artifacts
      # in extension/dist/<target> are always current and never need a manual
      # rebuild after a deploy.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Build browser extensions
        working-directory: extension
        run: npm run build

      # The production .env (real Buildium credentials, Entra, and LLM keys) is
      # kept on the runner host OUTSIDE the git checkout. actions/checkout cleans
      # gitignored files from the workspace on every run, and .env is gitignored,
      # so a .env placed in the workspace would be wiped before Compose runs.
      # Docker Compose resolves the `env_file: .env` directives and the
      # ${BUILDIUM_*} substitutions relative to the compose project directory
      # (this checkout / $GITHUB_WORKSPACE), so copy the host .env in here first.
      # Fail loudly if it is missing rather than silently deploying with the mock
      # defaults baked into docker-compose.yml.
      - name: Provision deploy .env
        env:
          # Optional override for the source .env path. When unset, default to
          # the .env that lives alongside the self-hosted runner install
          # (…/mcp-server-buildium/.env), three levels above $RUNNER_WORKSPACE
          # (…/mcp-server-buildium/actions-runner/_work/<repo>).
          BUILDIUM_ENV_FILE: ${{ vars.BUILDIUM_ENV_FILE }}
        run: |
          set -euo pipefail
          env_src="${BUILDIUM_ENV_FILE:-$RUNNER_WORKSPACE/../../../.env}"
          if [ ! -f "$env_src" ]; then
            echo "::error::Deploy .env not found at '$env_src'. Place the production .env there, or set the BUILDIUM_ENV_FILE repository variable to its absolute path on the runner."
            exit 1
          fi
          cp "$env_src" "$GITHUB_WORKSPACE/.env"
          echo "Provisioned .env into the workspace from: $env_src"

      # (Re)build and start the HTTP MCP server via Docker Compose. Credentials
      # and Entra/LLM settings come from the .env provisioned above.
      #
      # The build can intermittently fail on the long-lived self-hosted runner
      # with a BuildKit/containerd error such as:
      #   failed to prepare extraction snapshot ...: parent snapshot ... does
      #   not exist: not found
      # This happens when the runner's build/image cache references a layer
      # snapshot that has since been garbage-collected, leaving the store in an
      # inconsistent state. A normal cached build keeps deploys fast, so only
      # fall back to pruning the stale cache and doing a clean rebuild when the
      # first attempt hits this corruption.
      - name: Build server image
        run: |
          set -euo pipefail
          if ! docker compose build mcp-server-http; then
            echo "::warning::Build failed (likely corrupt BuildKit/containerd cache); pruning and retrying with --no-cache"
            docker compose down --remove-orphans || true
            docker image rm -f mcp-server-buildium:latest || true
            docker builder prune --all --force || true
            docker compose build --no-cache mcp-server-http
          fi

      - name: Deploy server
        run: docker compose up -d mcp-server-http
