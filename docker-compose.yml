# Local end-to-end testing stack: the mock Buildium API + the MCP server.
#
#   docker compose up --build mockapi            # start the seeded mock API
#   docker compose up --build mcp-server-http    # start the HTTP transport
#   docker compose run --rm mcp-server           # run the STDIO server on demand
#
# The STDIO `mcp-server` service speaks STDIO and needs an attached MCP client,
# so it is kept out of a plain `docker compose up` via the `stdio` profile and is
# intended to be exercised with `docker compose run`. The HTTP transport
# (`mcp-server-http`) runs as a long-lived service for remote/browser clients.

services:
  mockapi:
    build:
      context: .
      dockerfile: Dockerfile.mockapi
    image: mcp-server-buildium-mockapi:latest
    ports:
      - "8080:8080"
    environment:
      MOCKAPI_HOST: "0.0.0.0"
      MOCKAPI_PORT: "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8080/health').status==200 else sys.exit(1)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-server-buildium:latest
    # This service speaks STDIO and is meant to be attached on demand via
    # `docker compose run --rm mcp-server`. The `stdio` profile keeps it out of a
    # plain `docker compose up` so it does not start (and immediately exit)
    # without an attached MCP client. `docker compose run` still starts it even
    # though it is behind a profile.
    profiles: ["stdio"]
    depends_on:
      mockapi:
        condition: service_healthy
    # Load values from a local .env if present (gitignored). Anything defined
    # there (credentials, categories, etc.) is passed into the container. The
    # file is optional, so the mock defaults below still work without it.
    env_file:
      - path: .env
        required: false
    environment:
      # Container-specific values that must win over anything in .env. This
      # service is STDIO-only: force the STDIO transport (a LAN `BUILDIUM_HOST`
      # from .env would otherwise flip it into an HTTP server that cannot bind
      # that host inside the container and crashes with exit code 1) and bind all
      # interfaces just in case.
      BUILDIUM_TRANSPORT: "stdio"
      BUILDIUM_HOST: "0.0.0.0"
      # Fallbacks used only when the key is not already set in .env / the host
      # env. base_url must NOT include /v1 — the SDK appends it to each path.
      BUILDIUM_BASE_URL: "${BUILDIUM_BASE_URL:-http://mockapi:8080}"
      BUILDIUM_CLIENT_ID: "${BUILDIUM_CLIENT_ID:-mock-client-id}"
      BUILDIUM_CLIENT_SECRET: "${BUILDIUM_CLIENT_SECRET:-mock-client-secret}"
    stdin_open: true
    tty: true

  # HTTP (Streamable HTTP) transport for remote/browser clients such as the
  # extension in extension/. In production, terminate TLS at a reverse proxy in
  # front of this service and set BUILDIUM_ENTRA_* to require Entra ID tokens.
  #
  #   docker compose up --build mcp-server-http
  #
  mcp-server-http:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-server-buildium:latest
    depends_on:
      mockapi:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Load values from a local .env if present (gitignored). Anything defined
    # there — Buildium credentials, Microsoft Entra ID (tenant/audience), and
    # the server-side LLM assistant (BUILDIUM_LLM_*) — is passed into the
    # container so /chat and Entra auth work without hardcoding here. The file
    # is optional, so the mock defaults below still work without it.
    env_file:
      - path: .env
        required: false
    environment:
      # Container-specific value: always bind all interfaces inside the
      # container regardless of any BUILDIUM_HOST in .env (which typically holds
      # a LAN IP meant for running the server directly on the host).
      BUILDIUM_HOST: "0.0.0.0"
      # Fallbacks used only when the key is not already set in .env / host env.
      BUILDIUM_BASE_URL: "${BUILDIUM_BASE_URL:-http://mockapi:8080}"
      BUILDIUM_CLIENT_ID: "${BUILDIUM_CLIENT_ID:-mock-client-id}"
      BUILDIUM_CLIENT_SECRET: "${BUILDIUM_CLIENT_SECRET:-mock-client-secret}"
      BUILDIUM_TRANSPORT: "${BUILDIUM_TRANSPORT:-http}"
      BUILDIUM_PORT: "${BUILDIUM_PORT:-8000}"
      BUILDIUM_MCP_PATH: "${BUILDIUM_MCP_PATH:-/mcp}"
      # Allow the browser extension origin(s). Replace with your extension ID.
      BUILDIUM_CORS_ALLOW_ORIGINS: "${BUILDIUM_CORS_ALLOW_ORIGINS:-*}"
      # Dev auth bypass: skip ALL auth so the extension can hit /mcp and /chat
      # without an Entra tenant/token. Defaults to false so that a configured
      # Entra tenant/audience in .env actually takes effect. NON-PRODUCTION ONLY.
      BUILDIUM_DEV_AUTH_BYPASS: "${BUILDIUM_DEV_AUTH_BYPASS:-false}"
      # The server-side LLM assistant (BUILDIUM_LLM_PROVIDER / _MODEL /
      # _*_API_KEY) and Entra auth (BUILDIUM_ENTRA_*) are supplied via the .env
      # file above; keys are read here and never sent to the browser extension.
