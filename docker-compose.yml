# Local end-to-end testing stack: the mock Buildium API + the MCP server.
#
#   docker compose up --build mockapi        # start the seeded mock API
#   docker compose run --rm mcp-server        # run the MCP server against it
#
# The MCP server speaks STDIO, so it is intended to be attached to an MCP
# client (or exercised via `docker compose run`), while the mock API runs as a
# long-lived HTTP service.

services:
  mockapi:
    build:
      context: .
      dockerfile: Dockerfile.mockapi
    image: mcp-server-buildium-mockapi:latest
    ports:
      - "8080:8080"
    environment:
      MOCKAPI_HOST: "0.0.0.0"
      MOCKAPI_PORT: "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8080/health').status==200 else sys.exit(1)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-server-buildium:latest
    depends_on:
      mockapi:
        condition: service_healthy
    environment:
      # Point the server at the mock API service on the compose network.
      # base_url must NOT include /v1 — the SDK appends it to each path.
      BUILDIUM_BASE_URL: "http://mockapi:8080"
      BUILDIUM_CLIENT_ID: "mock-client-id"
      BUILDIUM_CLIENT_SECRET: "mock-client-secret"
    stdin_open: true
    tty: true

  # HTTP (Streamable HTTP) transport for remote/browser clients such as the
  # extension in extension/. In production, terminate TLS at a reverse proxy in
  # front of this service and set BUILDIUM_ENTRA_* to require Entra ID tokens.
  #
  #   docker compose up --build mcp-server-http
  #
  mcp-server-http:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-server-buildium:latest
    depends_on:
      mockapi:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      BUILDIUM_BASE_URL: "http://mockapi:8080"
      BUILDIUM_CLIENT_ID: "mock-client-id"
      BUILDIUM_CLIENT_SECRET: "mock-client-secret"
      # Serve Streamable HTTP on all interfaces.
      BUILDIUM_TRANSPORT: "http"
      BUILDIUM_HOST: "0.0.0.0"
      BUILDIUM_PORT: "8000"
      BUILDIUM_MCP_PATH: "/mcp"
      # Allow the browser extension origin(s). Replace with your extension ID,
      # or use a dev/static token instead of Entra for local testing.
      BUILDIUM_CORS_ALLOW_ORIGINS: "*"
      # Microsoft Entra ID JWT auth (uncomment and fill in for real auth):
      # BUILDIUM_ENTRA_TENANT_ID: "00000000-0000-0000-0000-000000000000"
      # BUILDIUM_ENTRA_AUDIENCE: "api://<api-app-client-id>"
      # BUILDIUM_ENTRA_REQUIRED_SCOPES: "MCP.Access"
