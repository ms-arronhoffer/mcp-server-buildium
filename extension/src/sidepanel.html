<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Desk AI Assistant</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="dot" id="conn-dot" title="Connection status"></span>
          <span class="title">Portfolio Desk AI Assistant</span>
        </div>
        <div class="actions">
          <button id="signin-btn" class="link" type="button">Sign in</button>
          <button id="settings-btn" class="link" type="button" title="Settings">⚙</button>
        </div>
      </header>

      <div id="status-banner" class="banner hidden"></div>

      <main id="messages" class="messages" aria-live="polite"></main>

      <form id="composer" class="composer">
        <div id="attachments" class="attachments hidden" aria-live="polite"></div>
        <div class="composer-row">
          <input
            id="file-input"
            type="file"
            class="hidden"
            multiple
            accept=".pdf,.png,.jpg,.jpeg,.webp,.txt,.csv,.md,.docx,application/pdf,image/png,image/jpeg,image/webp,text/plain,text/csv,text/markdown,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
          />
          <button id="attach-btn" type="button" class="attach" title="Attach a document" aria-label="Attach a document">📎</button>
          <textarea
            id="input"
            rows="1"
            placeholder="Ask about properties, leases, tenants…"
            autocomplete="off"
          ></textarea>
          <button id="send-btn" type="submit" title="Send">Send</button>
        </div>
      </form>
    </div>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
